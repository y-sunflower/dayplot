[project]
site_name = "dayplot"
repo_url = "https://github.com/y-sunflower/dayplot"
site_url = "https://y-sunflower.github.io/dayplot/"
site_description = "Calendar heatmaps with matplotlib"
site_author = "Joseph Barbier"
extra_css = ["stylesheets/style.css"]
nav = [
  { "Home" = "index.md" },
  { "Contributing" = "contributing.md" },
  { "Guides" = [
    "tuto/built-in-styles.md",
    "tuto/basic-styling.md",
    "tuto/categorical-data.md",
    "tuto/month-grid.md",
    "tuto/negative-values.md",
    "tuto/boxstyle.md",
    "tuto/legend.md",
    "tuto/interactive.md",
    "tuto/combine-charts.md",
    "tuto/fetch-github-contribs.md",
    "tuto/advanced.md",
  ] },
  { "Reference" = [
    "reference/calendar.md",
    "reference/fetch_github_contrib.md",
    "reference/load_dataset.md",
  ] },
]

[project.theme]
language = "en"
custom_dir = "overrides"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.expand",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra.analytics]
provider = "google"
property = "G-MLP58TWW3R"

[project.plugins.mkdocstrings.handlers.python]
paths = ["."]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = false
show_root_heading = true
heading_level = 3

[project.markdown_extensions.abbr]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.arithmatex"]
generic = true

[project.markdown_extensions."pymdownx.betterem"]

[project.markdown_extensions."pymdownx.blocks.caption"]

[project.markdown_extensions."pymdownx.caret"]

[project.markdown_extensions."pymdownx.critic"]

[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.emoji"]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions."pymdownx.inlinehilite"]

[project.markdown_extensions."pymdownx.keys"]

[project.markdown_extensions."pymdownx.magiclink"]

[project.markdown_extensions."pymdownx.mark"]

[project.markdown_extensions."pymdownx.smartsymbols"]

[project.markdown_extensions."pymdownx.snippets"]

[[project.markdown_extensions."pymdownx.superfences".custom_fences]]
name = "mermaid"
class = "mermaid"

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown_extensions."pymdownx.tilde"]

[project.markdown_extensions."dayplot._docs_matplotlib"]
